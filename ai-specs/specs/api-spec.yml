openapi: "3.1.0"
info:
  title: Voice AI Runtime API
  version: "1.0.0"
  description: >
    API for the Voice AI Runtime — health checks, Prometheus metrics,
    and admin endpoints for call inspection.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      description: >
        Returns system health status. Checks asyncpg pool connectivity,
        Redis reachability, and embedding model loading state.
      tags: [health]
      responses:
        "200":
          description: All checks passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more checks failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      summary: Prometheus metrics
      description: >
        Returns all registered Prometheus metrics in text exposition format.
        Metrics include voice_turn_latency_ms, voice_route_a_confidence,
        voice_route_b_confidence, voice_tool_execution_ms, voice_barge_in_total,
        voice_fallback_llm_total, voice_active_calls, voice_filler_emitted_total.
      tags: [health]
      responses:
        "200":
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string

  /api/v1/calls:
    get:
      summary: List recent calls
      description: Returns the 50 most recent call sessions ordered by started_at descending.
      tags: [admin]
      responses:
        "200":
          description: List of call sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallSummary"
        "503":
          description: Database not configured

  /api/v1/calls/{call_id}:
    get:
      summary: Get call detail
      description: >
        Returns a single call session with its turns and agent generations.
      tags: [admin]
      parameters:
        - name: call_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Call detail with turns and generations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallDetail"
        "404":
          description: Call not found
        "503":
          description: Database not configured

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        checks:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            models:
              type: string

    CallSummary:
      type: object
      properties:
        call_id:
          type: string
          format: uuid
        started_at:
          type: integer
          description: Epoch milliseconds
        ended_at:
          type: integer
          nullable: true
        status:
          type: string
        locale_hint:
          type: string
          nullable: true

    CallDetail:
      type: object
      properties:
        call:
          $ref: "#/components/schemas/CallSummary"
        turns:
          type: array
          items:
            $ref: "#/components/schemas/Turn"
        generations:
          type: array
          items:
            $ref: "#/components/schemas/AgentGeneration"

    Turn:
      type: object
      properties:
        turn_id:
          type: string
          format: uuid
        seq:
          type: integer
        started_at:
          type: integer
        finalized_at:
          type: integer
          nullable: true
        text_final:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        state:
          type: string

    AgentGeneration:
      type: object
      properties:
        agent_generation_id:
          type: string
          format: uuid
        turn_id:
          type: string
          format: uuid
        state:
          type: string
        route_a_label:
          type: string
          nullable: true
        route_a_confidence:
          type: number
          nullable: true
        specialist:
          type: string
          nullable: true
        created_at:
          type: integer
