services:
  voice-runtime:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://voiceai:voiceai@postgres:5432/voiceai
      REDIS_URL: redis://redis:6379/0
      STUN_SERVERS: stun:stun.l.google.com:19302
      MAX_CONCURRENT_CALLS: "50"
    volumes:
      - ./backend/src:/app/src
      - ./backend/router_registry:/app/router_registry

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - voice-runtime
    environment:
      NEXT_PUBLIC_API_URL: http://voice-runtime:8000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: voiceai
      POSTGRES_DB: voiceai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
